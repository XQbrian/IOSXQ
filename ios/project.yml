name: XQSecureWorkspaces
options:
  bundleIdPrefix: com.xqmsg.ios
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  swift: "6.0"
  createIntermediateGroups: true
  groupOrdering:
    - order: [App, Resources, Modules, Config]

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    ENABLE_BITCODE: NO
    SWIFT_STRICT_CONCURRENCY: complete

configFiles:
  Debug: Config/Config.xcconfig
  Release: Config/Config.xcconfig

packages:
  XQSecureWorkspacesPackage:
    path: .

targets:
  XQSecureWorkspaces:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: XQSecureWorkspaces/App
        name: App
      - path: XQSecureWorkspaces/Modules/UI
        name: UI
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/LaunchScreen.storyboard
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: XQ Secure Workspaces
        CFBundleDisplayName: XQ Secure
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        NSFaceIDUsageDescription: "Used to secure access to your encrypted workspace"
        NSPhotoLibraryUsageDescription: "Allows importing files from your photo library"
        NSCameraUsageDescription: "Allows scanning documents directly into your secure vault"
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            subscription.xqmsg.net:
              NSExceptionRequiresForwardSecrecy: true
              NSExceptionMinimumTLSVersion: TLSv1.3
            dashboard.xqmsg.net:
              NSExceptionRequiresForwardSecrecy: true
              NSExceptionMinimumTLSVersion: TLSv1.3
        XQ_API_KEY: $(XQ_API_KEY)
        XQ_DASHBOARD_API_KEY: $(XQ_DASHBOARD_API_KEY)
        XQ_BASE_URL: $(XQ_BASE_URL)
        XQ_DASHBOARD_URL: $(XQ_DASHBOARD_URL)
        AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
        AZURE_TENANT_ID: $(AZURE_TENANT_ID)
    entitlements:
      path: XQSecureWorkspaces.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:xqmsg.net
        com.apple.security.app-sandbox: false
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.xqmsg.ios.secureworkspaces
        com.apple.developer.devicecheck.appattest-environment: development
    dependencies:
      - package: XQSecureWorkspacesPackage
        product: XQCore
      - package: XQSecureWorkspacesPackage
        product: XQSecurity
      - package: XQSecureWorkspacesPackage
        product: XQNetworking
      - package: XQSecureWorkspacesPackage
        product: XQRepository
      - package: XQSecureWorkspacesPackage
        product: XQPolicy
      - package: XQSecureWorkspacesPackage
        product: XQAI
      - package: XQSecureWorkspacesPackage
        product: XQSync
      - package: XQSecureWorkspacesPackage
        product: XQEmailIntelligence
      - package: XQSecureWorkspacesPackage
        product: XQFileIntelligence
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xqmsg.ios.secureworkspaces
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: XQSecureWorkspaces.entitlements
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)

  XQSecureWorkspacesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
    dependencies:
      - target: XQSecureWorkspaces
      - package: XQSecureWorkspacesPackage
        product: XQCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xqmsg.ios.secureworkspacestests
